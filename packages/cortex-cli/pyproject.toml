[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "cortex-cli-agent"
version = "0.2.0"
description = "Personal Agent Infrastructure Stack — one install, infinite agents."
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [{ name = "Zhiyuan Wang" }]
keywords = ["cortex", "ai", "agent", "mcp", "cli", "infrastructure"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    "click>=8.1",
    "rich>=13.0",
    "pyyaml>=6.0",
]

[project.scripts]
cortex = "cortex_cli.main:cli"

[tool.hatch.build.targets.wheel]
packages = ["cortex_cli"]

[project.urls]
Homepage = "https://github.com/zzhiyuann/cortex/tree/main/packages/cortex-cli"
Repository = "https://github.com/zzhiyuann/cortex"
Issues = "https://github.com/zzhiyuann/cortex/issues"

[project.optional-dependencies]
all = [
    "forge-agent",
    "a2a-hub",
    "vibe-replay",
    "agent-dispatcher",
]

[tool.uv.sources]
forge-agent = { workspace = true }
a2a-hub = { workspace = true }
vibe-replay = { workspace = true }
agent-dispatcher = { workspace = true }
